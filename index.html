t", "property": "Text", "variant": "Default", "state": "Default", "tokenNickname": "receiptText", "darkValue": "Gray/200", "darkOpacity": "100%", "lightValue": "Gray/800", "lightOpacity": "100%"}, {"component": "Receipt", "property": "Subtitle", "variant": "Default", "state": "Default", "tokenNickname": "receiptSubtitle", "darkValue": "Gray/450", "darkOpacity": "100%", "lightValue": "Gray/500", "lightOpacity": "100%"}, {"component": "Receipt", "property": "Divider", "variant": "Default", "state": "Default", "tokenNickname": "receiptDivider", "darkValue": "NightSky/700", "darkOpacity": "100%", "lightValue": "Gray/300", "lightOpacity": "100%"}, {"component": "Signature", "property": "Border", "variant": "Default", "state": "Default", "tokenNickname": "signatureBorder", "darkValue": "NightSky/700", "darkOpacity": "100%", "lightValue": "Gray/300", "lightOpacity": "100%"}, {"component": "Signature", "property": "Text", "variant": "Default", "state": "Default", "tokenNickname": "signatureText", "darkValue": "Gray/200", "darkOpacity": "100%", "lightValue": "Gray/800", "lightOpacity": "100%"}]</script>
  <script>
    const TOKENS = JSON.parse(document.getElementById("token-data").textContent);

    const distinctComponents = new Set(TOKENS.map(t => t.component || "Other")).size;
    document.getElementById("summary-total").textContent = TOKENS.length;
    document.getElementById("summary-components").textContent = distinctComponents;

    // Configurable primitive palette - edit hex values to match your design system
    const PALETTE = {
      "NightSky/100": "#F8FAFC", "NightSky/300": "#94A3B8", "NightSky/400": "#64748B",
      "NightSky/500": "#475569", "NightSky/600": "#334155", "NightSky/700": "#1E293B",
      "NightSky/750": "#172033", "NightSky/800": "#0F172A", "NightSky/850": "#0C1322",
      "NightSky/900": "#080D18", "NightSky/950": "#050810", "NightSky/975": "#030508",
      "Primary/50": "#EFF6FF", "Primary/100": "#DBEAFE", "Primary/200": "#BFDBFE",
      "Primary/300": "#93C5FD", "Primary/400": "#60A5FA", "Primary/500": "#3B82F6",
      "Primary/600": "#2563EB", "Primary/700": "#1D4ED8", "Primary/800": "#1E40AF",
      "Primary/850": "#1E3A8A", "Primary/900": "#1E3A8A", "Primary/950": "#172554", "Primary/975": "#0F172A",
      "Gray/25": "#FCFCFD", "Gray/50": "#F9FAFB", "Gray/100": "#F3F4F6", "Gray/200": "#E5E7EB",
      "Gray/300": "#D1D5DB", "Gray/350": "#B8BEC8", "Gray/400": "#9CA3AF", "Gray/450": "#6B7280",
      "Gray/500": "#6B7280", "Gray/600": "#4B5563", "Gray/700": "#374151", "Gray/750": "#4B5563",
      "Gray/800": "#1F2937", "Gray/850": "#1C1917", "Gray/900": "#111827",
      "White": "#FFFFFF", "Transparent": "transparent",
      "Red/25": "#FFF5F5", "Red/50": "#FEF2F2", "Red/100": "#FEE2E2", "Red/200": "#FECACA",
      "Red/300": "#FCA5A5", "Red/400": "#F87171", "Red/500": "#EF4444", "Red/600": "#DC2626",
      "Red/700": "#B91C1C", "Red/800": "#991B1B", "Red/900": "#7F1D1D",
      "Green/25": "#F0FDF4", "Green/50": "#ECFDF5", "Green/100": "#D1FAE5", "Green/200": "#A7F3D0",
      "Green/300": "#6EE7B7", "Green/400": "#34D399", "Green/500": "#10B981", "Green/600": "#059669",
      "Green/700": "#047857", "Green/800": "#065F46", "Green/900": "#064E3B",
      "Yellow/25": "#FFFBEB", "Yellow/50": "#FEFCE8", "Yellow/100": "#FEF9C3", "Yellow/200": "#FEF08A",
      "Yellow/300": "#FDE047", "Yellow/400": "#FACC15", "Yellow/500": "#EAB308", "Yellow/600": "#CA8A04",
      "Yellow/700": "#A16207",
      "SoundGreen": "#10B981", "MediumEmerald": "#059669", "DarkEmerald": "#047857",
      "LightNavy": "#1E3A8A", "Navy": "#1E40AF"
    };

    function resolveColor(ref, opacity) {
      if (!ref) return null;
      const key = ref.trim();
      let hex = PALETTE[key];
      if (!hex && key.includes("/")) {
        const parts = key.split("/");
        const base = parts[0];
        const shade = parts[1];
        hex = PALETTE[base + "/" + shade] || PALETTE[key];
      }
      if (!hex || hex === "transparent") return hex;
      const pct = opacity ? parseInt(opacity) : 100;
      if (pct < 100 && hex.startsWith("#")) {
        const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
        return `rgba(${r},${g},${b},${pct/100})`;
      }
      return hex;
    }

    function parseOpacity(opacityStr) {
      if (!opacityStr) return 100;
      const m = opacityStr.match(/(\d+)/);
      return m ? parseInt(m[1]) : 100;
    }

    function showToast() {
      const t = document.getElementById("toast");
      t.classList.remove("opacity-0");
      setTimeout(() => t.classList.add("opacity-0"), 1200);
    }

    function makeCopyable(el, text, onClick) {
      el.classList.add("cursor-pointer", "hover:scale-105", "active:scale-95", "transition-all", "duration-300");
      el.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(text);
          showToast();
          if (onClick) onClick();
        } catch (e) { console.warn("Copy failed", e); }
      });
    }

    let viewMode = "grid";

    function renderTokens(filtered) {
      const container = document.getElementById("token-list");
      container.innerHTML = "";

      if (viewMode === "list") {
        renderListView(container, filtered);
      } else {
        renderGridView(container, filtered);
      }
    }

    function renderGridView(container, filtered) {
      const groups = {};
      filtered.forEach(t => {
        const c = t.component || "Other";
        if (!groups[c]) groups[c] = [];
        groups[c].push(t);
      });

      Object.keys(groups).sort().forEach(component => {
        const section = document.createElement("section");
        section.className = "space-y-4";
        section.innerHTML = `<h2 class="text-xl font-semibold text-slate-800 border-b border-slate-200 pb-2">${component}</h2>`;
        const grid = document.createElement("div");
        grid.className = "grid gap-4 sm:grid-cols-1 lg:grid-cols-2 xl:grid-cols-3";

        groups[component].forEach(t => {
          const darkHex = resolveColor(t.darkValue, parseOpacity(t.darkOpacity));
          const lightHex = resolveColor(t.lightValue, parseOpacity(t.lightOpacity));
          const darkBg = darkHex && darkHex !== "transparent" ? darkHex : (darkHex === "transparent" ? "repeating-conic-gradient(#80808020 0% 25%, transparent 0% 50%) 50%/16px 16px" : "#E5E7EB");
          const lightBg = lightHex && lightHex !== "transparent" ? lightHex : (lightHex === "transparent" ? "repeating-conic-gradient(#80808020 0% 25%, transparent 0% 50%) 50%/16px 16px" : "#E5E7EB");

          const card = document.createElement("div");
          card.className = "rounded-xl border border-slate-200 overflow-hidden shadow-sm hover:shadow-md transition-all duration-300";
          card.innerHTML = `
            <div class="flex flex-col">
              <div class="bg-white px-4 py-3 border-b border-slate-200">
                <div class="font-mono text-sm font-medium text-slate-800" data-copy="${t.tokenNickname}">${t.tokenNickname}</div>
                <div class="text-xs text-slate-500">${[t.property, t.variant, t.state].filter(Boolean).join(" · ")}</div>
              </div>
              <div class="grid grid-cols-2">
                <div class="bg-[#0F172A] p-4 space-y-2">
                  <div class="text-xs font-medium text-slate-400">Dark</div>
                  <div class="flex items-center gap-2">
                    <div class="w-10 h-10 rounded-lg border border-slate-600 shrink-0" style="background:${darkBg}" data-copy="${darkHex || t.darkValue}" data-type="swatch"></div>
                    <span class="font-mono text-xs truncate text-slate-300" data-copy="${t.darkValue}">${t.darkValue}</span>
                  </div>
                </div>
                <div class="bg-white p-4 space-y-2">
                  <div class="text-xs font-medium text-slate-600">Light</div>
                  <div class="flex items-center gap-2">
                    <div class="w-10 h-10 rounded-lg border border-slate-200 shrink-0" style="background:${lightBg}" data-copy="${lightHex || t.lightValue}" data-type="swatch"></div>
                    <span class="font-mono text-xs truncate text-slate-700" data-copy="${t.lightValue}">${t.lightValue}</span>
                  </div>
                </div>
              </div>
            </div>
          `;

          card.querySelectorAll("[data-copy]").forEach((el) => {
            const copyVal = el.dataset.copy;
            const text = el.dataset.type === "swatch" && copyVal && !copyVal.startsWith("repeating") ? copyVal : copyVal;
            makeCopyable(el, text);
          });

          grid.appendChild(card);
        });

        section.appendChild(grid);
        container.appendChild(section);
      });
    }

    function renderListView(container, filtered) {
      const table = document.createElement("div");
      table.className = "bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm";
      table.innerHTML = `
        <div class="w-full min-w-0 overflow-x-auto">
          <table class="w-full min-w-0 text-sm" style="table-layout: fixed">
            <colgroup>
              <col style="width: 10%"><col style="width: 10%"><col style="width: 8%"><col style="width: 8%"><col style="width: 24%"><col style="width: 20%"><col style="width: 20%">
            </colgroup>
            <thead>
              <tr class="bg-slate-50 border-b border-slate-200">
                <th class="text-left px-4 py-3 font-semibold text-slate-700 truncate">Component</th>
                <th class="text-left px-4 py-3 font-semibold text-slate-700 truncate">Property</th>
                <th class="text-left px-4 py-3 font-semibold text-slate-700 truncate">Variant</th>
                <th class="text-left px-4 py-3 font-semibold text-slate-700 truncate">State</th>
                <th class="text-left px-4 py-3 font-semibold text-slate-700 truncate">Token Nickname</th>
                <th class="text-left px-4 py-3 font-semibold text-slate-700 truncate">Dark Value</th>
                <th class="text-left px-4 py-3 font-semibold text-slate-700 truncate">Light Value</th>
              </tr>
            </thead>
            <tbody id="list-tbody"></tbody>
          </table>
        </div>
      `;

      const tbody = table.querySelector("#list-tbody");
      filtered.forEach((t, i) => {
        const darkHex = resolveColor(t.darkValue, parseOpacity(t.darkOpacity));
        const lightHex = resolveColor(t.lightValue, parseOpacity(t.lightOpacity));
        const darkBg = darkHex && darkHex !== "transparent" ? darkHex : (darkHex === "transparent" ? "repeating-conic-gradient(#80808020 0% 25%, transparent 0% 50%) 50%/16px 16px" : "#E5E7EB");
        const lightBg = lightHex && lightHex !== "transparent" ? lightHex : (lightHex === "transparent" ? "repeating-conic-gradient(#80808020 0% 25%, transparent 0% 50%) 50%/16px 16px" : "#E5E7EB");
        const rowClass = i % 2 === 0 ? "bg-white" : "bg-slate-50/50";

        const tr = document.createElement("tr");
        tr.className = `${rowClass} border-b border-slate-100 hover:bg-slate-100/50 transition-colors`;
        tr.innerHTML = `
          <td class="px-4 py-2 text-slate-700 truncate overflow-hidden" data-copy="${t.component}">${t.component}</td>
          <td class="px-4 py-2 text-slate-600 truncate overflow-hidden" data-copy="${t.property}">${t.property}</td>
          <td class="px-4 py-2 text-slate-600 truncate overflow-hidden" data-copy="${t.variant}">${t.variant}</td>
          <td class="px-4 py-2 text-slate-600 truncate overflow-hidden" data-copy="${t.state}">${t.state}</td>
          <td class="px-4 py-2 font-mono text-slate-800 truncate overflow-hidden" data-copy="${t.tokenNickname}">${t.tokenNickname}</td>
          <td class="px-4 py-2 overflow-hidden">
            <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-lg bg-[#0F172A] border border-slate-600 min-w-0 max-w-full">
              <div class="w-8 h-8 rounded border border-slate-600 shrink-0" style="background:${darkBg}" data-copy="${darkHex || t.darkValue}" data-type="swatch"></div>
              <span class="font-mono text-xs text-slate-300 truncate" data-copy="${t.darkValue}">${t.darkValue}</span>
            </div>
          </td>
          <td class="px-4 py-2 overflow-hidden">
            <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-lg bg-white border border-slate-200 shadow-sm min-w-0 max-w-full">
              <div class="w-8 h-8 rounded border border-slate-200 shrink-0" style="background:${lightBg}" data-copy="${lightHex || t.lightValue}" data-type="swatch"></div>
              <span class="font-mono text-xs text-slate-700 truncate" data-copy="${t.lightValue}">${t.lightValue}</span>
            </div>
          </td>
        `;

        tr.querySelectorAll("[data-copy]").forEach((el) => {
          const copyVal = el.dataset.copy;
          const text = el.dataset.type === "swatch" && copyVal && !copyVal.startsWith("repeating") ? copyVal : copyVal;
          makeCopyable(el, text);
        });

        tbody.appendChild(tr);
      });

      container.appendChild(table);
    }

    function setViewMode(mode) {
      viewMode = mode;
      document.getElementById("view-grid").className = `px-4 py-2 text-sm font-medium transition-all duration-300 ${mode === "grid" ? "bg-primary text-white" : "bg-white text-slate-600 hover:bg-slate-50"}`;
      document.getElementById("view-list").className = `px-4 py-2 text-sm font-medium transition-all duration-300 ${mode === "list" ? "bg-primary text-white" : "bg-white text-slate-600 hover:bg-slate-50"}`;
    }

    document.getElementById("search").addEventListener("input", (e) => {
      const q = e.target.value.toLowerCase().trim();
      const filtered = q ? TOKENS.filter(t =>
        t.tokenNickname.toLowerCase().includes(q) ||
        t.component.toLowerCase().includes(q) ||
        t.property.toLowerCase().includes(q)
      ) : TOKENS;
      renderTokens(filtered);
    });

    document.getElementById("view-grid").addEventListener("click", () => {
      setViewMode("grid");
      const q = document.getElementById("search").value.toLowerCase().trim();
      const filtered = q ? TOKENS.filter(t =>
        t.tokenNickname.toLowerCase().includes(q) ||
        t.component.toLowerCase().includes(q) ||
        t.property.toLowerCase().includes(q)
      ) : TOKENS;
      renderTokens(filtered);
    });

    document.getElementById("view-list").addEventListener("click", () => {
      setViewMode("list");
      const q = document.getElementById("search").value.toLowerCase().trim();
      const filtered = q ? TOKENS.filter(t =>
        t.tokenNickname.toLowerCase().includes(q) ||
        t.component.toLowerCase().includes(q) ||
        t.property.toLowerCase().includes(q)
      ) : TOKENS;
      renderTokens(filtered);
    });

    renderTokens(TOKENS);
  </script>
